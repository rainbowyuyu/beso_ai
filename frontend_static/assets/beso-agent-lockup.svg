  <path fill="url(#mkFish)" d="M22.5 17.2c.9-1.4 2.8-2.2 4.6-1.4l3.2 1.6 1.5-.8v3.3l-1.5-.8-3.2 1.6c-1.8.8-3.7 0-4.6-1.5-.35-.65-.35-1.25 0-1.9z"/>
  <circle cx="25.2" cy="16.2" r="0.9" fill="#fff"/>
