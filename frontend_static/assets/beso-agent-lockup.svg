<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ZJU OC4 Rainbow">
  <title>ZJU · OC4 · Rainbow</title>
  <defs>
    <linearGradient id="mkArc" x1="0%" y1="100%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="35%" stop-color="#eab308"/>
      <stop offset="70%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="mkFish" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0f766e"/>
    </linearGradient>
    <linearGradient id="mkZju" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="9" fill="#003978"/>
  <!-- 左上：微型 ZJU 三竖条 -->
  <rect x="4" y="5" width="2.2" height="9" rx="1" fill="url(#mkZju)"/>
  <rect x="7.2" y="6.2" width="2.2" height="7.8" rx="1" fill="url(#mkZju)" opacity=".9"/>
  <rect x="10.4" y="7.3" width="2.2" height="6.7" rx="1" fill="url(#mkZju)" opacity=".82"/>
  <!-- 中：OC4 俯视三柱 + 中心 -->
  <g transform="translate(15, 10)" fill="none" stroke="#f1f5f9" stroke-width="0.9" stroke-linecap="round">
    <circle cx="7.5" cy="3.2" r="2.6" fill="#1e293b" fill-opacity=".35" stroke="#e2e8f0"/>
    <circle cx="2.2" cy="10.5" r="2.6" fill="#1e293b" fill-opacity=".35" stroke="#e2e8f0"/>
    <circle cx="12.8" cy="10.5" r="2.6" fill="#1e293b" fill-opacity=".35" stroke="#e2e8f0"/>
    <circle cx="7.5" cy="8.5" r="1.9" fill="#334155" fill-opacity=".5" stroke="#cbd5e1"/>
    <path d="M7.5 5.8v1.9M5.2 7.2l1.5.8M9.8 7.2l-1.5.8M4 10.5h7" opacity=".85"/>
  </g>
